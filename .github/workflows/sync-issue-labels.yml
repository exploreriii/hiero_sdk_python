name: Sync Linked Issue Labels to PR

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to sync labels for"
        required: true
        type: number
      dry_run:
        description: "Dry run (log only, do not apply labels)"
        required: false
        type: boolean
        default: true

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  sync-issue-labels:
    runs-on: ubuntu-latest

    concurrency:
      group: sync-issue-labels-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
      cancel-in-progress: true

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          ref: main

      - name: Sync labels from linked issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          github-token: ${{ github.token }}
          script: |
            const script = require('./.github/scripts/sync-issue-labels.js');
            await script({ github, context, core });
