name: Hiero Solo Integration Tests

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@2ddd2b9cb38ad8efd50337e8ab201519a34c9f24 # v7.1.1

      - name: Install setuptools wheel
        run: pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Generate Proto Files
        run: uv run python generate_proto.py

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@6a1a77601cf3e69661fb6880530a4edf656b40d5 # v0.14.0
        with:
          installMirrorNode: true

      - name: Set environment variables
        run: |
          echo "OPERATOR_ID=${{ steps.solo.outputs.accountId }}"
          echo "OPERATOR_KEY=${{ steps.solo.outputs.privateKey }}"
          echo "ADMIN_KEY=${{ steps.solo.outputs.privateKey }}"
          echo "PUBLIC_KEY=${{ steps.solo.outputs.publicKey }}"

      - name: Install your package
        run: pip install -e .
      - name: Run integration tests per file
        id: integration
        env:
          OPERATOR_ID: ${{ steps.solo.outputs.accountId }}
          OPERATOR_KEY: ${{ steps.solo.outputs.privateKey }}
          ADMIN_KEY: ${{ steps.solo.outputs.privateKey }}
          PUBLIC_KEY: ${{ steps.solo.outputs.publicKey }}
          NETWORK: solo
        run: |
          INTEGRATION_FAILED=0
          for file in $(find tests/integration -name "*.py"); do
            echo -e "\n************ Running $file ************"
            if ! output=$(uv run pytest "$file" 2>&1); then
              echo "❌ $file failed:"
              echo "$output"
              INTEGRATION_FAILED=1
              break   # stop remaining integration tests on first failure
            else
              echo "✅ $file succeeded"
            fi
          done
          echo "Integration tests completed with status: $INTEGRATION_FAILED"
          echo "integration_failed=$INTEGRATION_FAILED" >> $GITHUB_OUTPUT

      - name: Run unit tests per file
        id: unit
        run: |
          UNIT_FAILED=0
          for file in $(find tests/unit -name "*.py"); do
            echo -e "\n************ Running $file ************"
            if ! output=$(uv run pytest "$file" 2>&1); then
              echo "❌ $file failed:"
              echo "$output"
              UNIT_FAILED=1
              break   # stop remaining unit tests on first failure
            else
              echo "✅ $file succeeded"
            fi
          done
          echo "Unit tests completed with status: $UNIT_FAILED"

      - name: Fail workflow if tests failed
        run: |
          if [ "${{ steps.integration.outputs.integration_failed }}" -eq 1 ] || [ "$UNIT_FAILED" -eq 1 ]; then
            echo "❌ Some tests failed. Failing workflow."
            exit 1
          else
            echo "✅ All tests passed!"
          fi
